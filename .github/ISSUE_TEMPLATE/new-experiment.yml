name: Share an AI resource
description: Add a Skill, Prompt, Directive, Project, or Workflow to the Knowledge Hub. No coding needed.
title: "[Resource] "
labels: ["submission"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for sharing! Fill this in and submit — a maintainer reviews it and it appears on the site.
        You don't need to touch git or Markdown.

  - type: dropdown
    id: type
    attributes:
      label: Type of Resource
      options:
        - Skill
        - Prompt
        - Directive
        - Project
        - Workflow
        - Other
    validations:
      required: true

  - type: input
    id: title
    attributes:
      label: Title
      description: |
        Standard nomenclature — clear, descriptive, Title Case. No version numbers or emojis.
        Format: "<What it does>" or "<Tool> — <purpose>". e.g. "Jira Worklog Skill",
        "First-Principles Critical Thinking".
      placeholder: Jira Worklog Skill
    validations:
      required: true

  - type: textarea
    id: banner
    attributes:
      label: Banner / Image (optional)
      description: Drag in one image to show on the card. Leave blank to use the category icon.

  - type: input
    id: summary
    attributes:
      label: One-line summary
      description: Shown on the card. Keep it to a sentence.
      placeholder: Manage Jira worklogs with natural-language prompts.
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: |
        Paste the actual skill / prompt / directive / project instructions, plus any notes on how to use it.
        Put prompts and directives inside a code block (the ``` button) so people can copy them cleanly.
      placeholder: |
        ## How to use
        Paste into Settings → Custom Instructions.

        ```text
        You are a rigorous, first-principles thinker...
        ```
    validations:
      required: true

  - type: input
    id: made_by
    attributes:
      label: Made by
      description: The person who created it.
      placeholder: Your name
    validations:
      required: true

  - type: dropdown
    id: tags
    attributes:
      label: Tags (optional)
      description: Pick all that apply — these power the homepage filters.
      multiple: true
      options:
        - claude
        - gpt
        - gemini
        - model-agnostic
        - custom-instructions
        - critical-thinking
        - productivity
        - voice-tone
        - discovery
        - research
        - ideation
        - wireframing
        - content
        - testing
        - handoff
        - designer
        - researcher
        - pm
        - writer
        - beginner
        - intermediate
        - advanced

  - type: input
    id: figma_url
    attributes:
      label: Figma link (optional)
      placeholder: https://www.figma.com/file/...

  - type: input
    id: links
    attributes:
      label: Other links (optional)
      placeholder: Loom, demo, related doc...

  - type: textarea
    id: attachments
    attributes:
      label: File attachments (optional)
      description: |
        Drag in one or more files — a skill file (.skill / .zip), a .txt or .md, screenshots, etc.
        GitHub uploads them and they get saved with your entry as downloads automatically.
