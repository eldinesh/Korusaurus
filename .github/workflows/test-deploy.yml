name: Test build

# Builds the site on every PR (including the auto-generated experiment PRs) so a
# broken submission fails HERE, before merge — never on the live site.

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
